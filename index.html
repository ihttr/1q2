<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusDL - Premium Video Downloader</title>
    
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons (CDN) -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; }
        /* Custom Scrollbar */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #52525b; }
        /* Smooth reveal animation */
        .fade-in-up { animation: fadeInUp 0.6s ease-out forwards; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen bg-[#09090b] text-zinc-100 selection:bg-cyan-500/30 pb-20">

    <!-- Navbar -->
    <nav class="border-b border-zinc-800/50 p-5 sticky top-0 z-50 bg-[#09090b]/80 backdrop-blur-xl">
        <div class="max-w-6xl mx-auto flex items-center gap-3">
            <div class="bg-gradient-to-br from-cyan-400 to-blue-600 w-10 h-10 rounded-xl flex items-center justify-center shadow-lg shadow-cyan-500/20">
                <i data-lucide="download" class="text-black stroke-[3px] w-5 h-5"></i>
            </div>
            <span class="text-2xl font-black tracking-tighter uppercase italic text-white">NexusDL</span>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-6 pt-24">
        <!-- Hero Section -->
        <div class="text-center mb-16 fade-in-up">
            <h1 class="text-5xl md:text-7xl font-extrabold mb-6 tracking-tight leading-tight">
                The Ultimate <br />
                <span class="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 via-blue-500 to-purple-600">Media Downloader.</span>
            </h1>
            <p class="text-zinc-400 text-lg md:text-xl font-medium max-w-2xl mx-auto">
                Extract stunning 4K video and crystal-clear audio from YouTube, Twitter, TikTok, and 1,000+ other sites.
            </p>
        </div>

        <!-- Search Form -->
        <form id="downloadForm" class="relative group max-w-2xl mx-auto mb-16 z-20 fade-in-up" style="animation-delay: 0.1s;">
            <div class="absolute -inset-1 bg-gradient-to-r from-cyan-500 via-blue-500 to-purple-600 rounded-2xl blur-md opacity-25 group-focus-within:opacity-60 transition duration-500"></div>
            <div class="relative flex flex-col md:flex-row gap-3 bg-zinc-900 border border-zinc-800 p-2 rounded-2xl shadow-2xl">
                <div class="items-center pl-4 text-zinc-500 hidden md:flex">
                    <i data-lucide="link" class="w-5 h-5"></i>
                </div>
                <input 
                    id="videoUrl"
                    type="url"
                    class="w-full bg-transparent p-4 focus:outline-none font-medium text-lg placeholder:text-zinc-600" 
                    placeholder="Paste any video link here..." 
                    required
                />
                <button 
                    id="submitBtn"
                    type="submit"
                    class="bg-zinc-100 text-black px-8 py-4 md:py-0 rounded-xl font-bold hover:bg-cyan-400 hover:text-black transition-all flex items-center justify-center gap-2"
                >
                    <span id="btnText">Download</span>
                    <i id="btnSpinner" data-lucide="loader-2" class="w-5 h-5 animate-spin hidden"></i>
                </button>
            </div>
        </form>

        <!-- Error Alert -->
        <div id="errorAlert" class="hidden bg-red-500/10 border border-red-500/50 text-red-400 p-4 rounded-xl items-center gap-3 max-w-2xl mx-auto mb-8">
            <i data-lucide="alert-circle" class="w-5 h-5 flex-shrink-0"></i>
            <p id="errorText">Could not fetch video. Please ensure the link is public and valid.</p>
        </div>

        <!-- Results Section -->
        <div id="resultsSection" class="hidden bg-zinc-900/40 border border-zinc-800 rounded-3xl p-6 md:p-8 shadow-2xl fade-in-up">
            <div class="grid md:grid-cols-[1fr_1.5fr] gap-8">
                
                <!-- Video Info (Left) -->
                <div class="space-y-6">
                    <div class="relative group rounded-2xl overflow-hidden border border-zinc-800">
                        <img id="resThumbnail" src="" class="w-full object-cover aspect-video group-hover:scale-105 transition-transform duration-500" alt="Thumbnail" />
                        <div id="resPlatform" class="absolute top-3 left-3 bg-black/70 backdrop-blur-md px-3 py-1 rounded-lg text-xs font-bold uppercase border border-white/10"></div>
                    </div>
                    <div>
                        <h2 id="resTitle" class="text-xl font-bold leading-snug mb-3 line-clamp-2"></h2>
                        <div class="flex flex-wrap gap-2 text-sm font-medium">
                            <span class="bg-zinc-800 px-3 py-1.5 rounded-lg text-zinc-300">⏱ <span id="resDuration"></span></span>
                            <span class="bg-zinc-800 px-3 py-1.5 rounded-lg text-zinc-300">👤 <span id="resUploader"></span></span>
                        </div>
                    </div>
                </div>

                <!-- Downloads (Right) -->
                <div class="flex flex-col h-full">
                    <!-- Tabs -->
                    <div class="flex gap-2 bg-zinc-900 p-1.5 rounded-xl mb-6 border border-zinc-800/80 w-fit">
                        <button type="button" onclick="switchTab('videos')" id="tab-videos" class="px-5 py-2 rounded-lg font-bold text-sm transition-all flex gap-2 items-center bg-zinc-800 text-cyan-400 shadow-sm">
                            <i data-lucide="film" class="w-4 h-4"></i> Video
                        </button>
                        <button type="button" onclick="switchTab('audios')" id="tab-audios" class="px-5 py-2 rounded-lg font-bold text-sm transition-all flex gap-2 items-center text-zinc-500 hover:text-zinc-300">
                            <i data-lucide="music" class="w-4 h-4"></i> Audio
                        </button>
                    </div>

                    <!-- List Container -->
                    <div id="formatsList" class="space-y-3 max-h-[400px] overflow-y-auto pr-2 custom-scrollbar">
                        <!-- Dynamic content goes here -->
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Initialize Icons
        lucide.createIcons();

        // CHANGE THIS TO YOUR RENDER URL
        const BACKEND_URL = "https://your-backend-app.onrender.com"; 
        
        let currentData = null;
        let activeTab = 'videos';

        const form = document.getElementById('downloadForm');
        const urlInput = document.getElementById('videoUrl');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const btnSpinner = document.getElementById('btnSpinner');
        const errorAlert = document.getElementById('errorAlert');
        const resultsSection = document.getElementById('resultsSection');
        const formatsList = document.getElementById('formatsList');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const url = urlInput.value.trim();
            if(!url) return;

            // UI Loading State
            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-50', 'cursor-not-allowed');
            btnText.innerText = 'Analyzing...';
            btnSpinner.classList.remove('hidden');
            errorAlert.classList.add('hidden', 'flex');
            resultsSection.classList.add('hidden');

            try {
                const response = await fetch(`${BACKEND_URL}/extract?url=${encodeURIComponent(url)}`);
                if (!response.ok) throw new Error('Network response was not ok');
                
                const json = await response.json();
                currentData = json.data;
                
                // Populate UI
                document.getElementById('resThumbnail').src = currentData.thumbnail;
                document.getElementById('resTitle').innerText = currentData.title;
                document.getElementById('resDuration').innerText = currentData.duration;
                document.getElementById('resUploader').innerText = currentData.uploader;
                document.getElementById('resPlatform').innerText = currentData.platform;

                // Show Results
                resultsSection.classList.remove('hidden');
                switchTab('videos');

            } catch (err) {
                console.error(err);
                errorAlert.classList.remove('hidden');
                errorAlert.style.display = 'flex';
            } finally {
                // Reset Button UI
                submitBtn.disabled = false;
                submitBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                btnText.innerText = 'Download';
                btnSpinner.classList.add('hidden');
            }
        });

        function switchTab(tabName) {
            activeTab = tabName;
            
            // Update Tab UI Colors
            const tabVideos = document.getElementById('tab-videos');
            const tabAudios = document.getElementById('tab-audios');
            
            if (tabName === 'videos') {
                tabVideos.className = "px-5 py-2 rounded-lg font-bold text-sm transition-all flex gap-2 items-center bg-zinc-800 text-cyan-400 shadow-sm";
                tabAudios.className = "px-5 py-2 rounded-lg font-bold text-sm transition-all flex gap-2 items-center text-zinc-500 hover:text-zinc-300";
            } else {
                tabAudios.className = "px-5 py-2 rounded-lg font-bold text-sm transition-all flex gap-2 items-center bg-zinc-800 text-purple-400 shadow-sm";
                tabVideos.className = "px-5 py-2 rounded-lg font-bold text-sm transition-all flex gap-2 items-center text-zinc-500 hover:text-zinc-300";
            }

            renderFormats();
        }

        function renderFormats() {
            formatsList.innerHTML = ''; // Clear list

            if (!currentData || !currentData[activeTab] || currentData[activeTab].length === 0) {
                formatsList.innerHTML = `<p class="text-zinc-500 text-center py-8">No formats available for this selection.</p>`;
                return;
            }

            const items = currentData[activeTab];
            const iconType = activeTab === 'videos' ? 'film' : 'music';
            const colorClass = activeTab === 'videos' ? 'text-cyan-400' : 'text-purple-400';

            items.forEach(item => {
                const div = document.createElement('div');
                div.className = "flex flex-col sm:flex-row sm:items-center justify-between p-4 rounded-xl bg-zinc-800/30 hover:bg-zinc-800/80 border border-transparent hover:border-zinc-700 transition-all gap-4";
                
                div.innerHTML = `
                    <div>
                        <div class="font-bold flex items-center gap-2 text-zinc-100">
                            <i data-lucide="${iconType}" class="w-4 h-4 ${colorClass}"></i>
                            ${item.quality}
                        </div>
                        <div class="text-sm text-zinc-400 mt-1 uppercase flex gap-2 items-center">
                            <span class="bg-zinc-700/50 px-2 py-0.5 rounded text-xs text-white">${item.ext}</span>
                            <span>• ${item.size}</span>
                        </div>
                    </div>
                    <a href="${item.url}" target="_blank" rel="noreferrer" class="bg-white text-black text-center sm:text-left hover:bg-cyan-400 hover:shadow-[0_0_20px_rgba(6,182,212,0.4)] px-5 py-2.5 rounded-lg font-bold text-sm transition-all flex items-center justify-center gap-2">
                        <i data-lucide="download" class="w-4 h-4"></i> Save
                    </a>
                `;
                formatsList.appendChild(div);
            });

            // Re-initialize icons for the newly injected HTML
            lucide.createIcons();
        }
    </script>
</body>
</html>
